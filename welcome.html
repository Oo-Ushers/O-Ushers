<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAGE API</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Animated background glow */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 204, 0, 0.08) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 520px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: #ffcc00;
      margin-bottom: 12px;
      animation: fadeInDown 0.8s ease-out 0.15s both;
    }

    .tagline {
      font-size: 18px;
      color: #999999;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out 0.3s both;
    }

    .status-card {
      background: #141414;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 28px 24px;
      margin-bottom: 32px;
      animation: fadeInUp 0.8s ease-out 0.45s both;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .status-row:not(:last-child) {
      border-bottom: 1px solid #1e1e1e;
    }

    .status-label {
      font-size: 14px;
      color: #777777;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #22c55e;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #22c55e;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .version {
      font-size: 13px;
      color: #555555;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ffcc00, transparent);
      margin: 24px auto;
      border-radius: 2px;
      animation: fadeInUp 0.8s ease-out 0.55s both;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 32px; }
      .tagline { font-size: 16px; }
      .container { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://res.cloudinary.com/dizb3j2hj/image/upload/v1750703190/white_yellow_oi4lz1.png" alt="RAGE Logo">
    </div>
    <h1>RAGE API</h1>
    <p class="tagline">Backend services are up and running</p>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Server</span>
        <span class="status-badge">
          <span class="status-dot"></span>
          Operational
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">API</span>
        <span class="status-badge">
          <span class="status-dot"></span>
          Online
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Database</span>
        <span class="status-badge">
          <span class="status-dot"></span>
          Connected
        </span>
      </div>
    </div>

    <div class="divider"></div>
    <p class="version">v1.0.0 &bull; &copy; 2026 RAGE</p>
  </div>
</body>
</html>
